<!DOCTYPE html>
<html>
<head>
<title>BMI Calculator</title>

<script>

function bmi() {

    let w = parseFloat(document.getElementById("w").value);
    let h = parseFloat(document.getElementById("h").value);
    let output = document.getElementById("output");

    // Check inputs first
    if (isNaN(w) || isNaN(h) || w <= 0 || h <= 0){
        output.innerHTML = "Please enter valid numbers for weight (lbs) and height (inches).";
        return;
    }

    // Calculate BMI
    let bmiValue = 703 * (w / (h ** 2));

    let msg = "";
    let filename = "";

    // Determine BMI status
    if (bmiValue < 18.5){
        msg = "Underweight";
        filename = "underweight.png";
    }
    else if (bmiValue <= 24.9){
        msg = "Healthy Weight";
        filename = "healthyweight.png";
    }
    else if (bmiValue <= 29.9){
        msg = "Overweight";
        filename = "overweight.png";
    }
    else{
        msg = "Obesity";
        filename = "obeseweight.png";
    }

    // Display result
    output.innerHTML =
    "Your BMI is " + bmiValue.toFixed(1) +
    "<br>Status: " + msg +
    "<br><img src='" + filename + "' alt='" + msg + "'>";

}

</script>

</head>

<body>

<h1>BMI Calculator</h1>

<p>Enter your weight (lbs):</p>
<input type="text" id="w">

<p>Enter your height (inches):</p>
<input type="text" id="h">

<br><br>

<button onclick="bmi()">Calculate BMI</button>

<br><br>

<div id="output"></div>

</body>
</html>
